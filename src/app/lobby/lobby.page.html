<div class="lobby-page-wrapper">
  <div class="sidebar-card-ad">
    [register to play/prize banner size tbd]
  </div>

  <div class="lobby-page">
    <div class="lobby-page-container">
      <div class="filters">
        <button *ngFor="let g of enabledGames()" [class.active]="activeGame() === g" (click)="selectGame(g)">
          {{ g }}
        </button>
      </div>

      <div *ngIf="hasDisplayablePickems(); else empty" class="lobby-container">
        <div class="lobby-main">
    
          <section class="pickem-section" *ngIf="closingSoonPickems().length">
            <h2 class="section-title">Closing Soon</h2>
           <div class="sidebar-card-ad">
              [register to play/prize banner size tbd]
            </div>
       
            <div class="cards-grid">
              <app-pickem-vs-card class="pickem-card" *ngFor="let pickem of closingSoonPickems()" [match]="pickem"
                [notificationsEnabled]="isMatchSubscribed(pickem.id)"
                [notificationsLoading]="isSubscriptionPending(pickem.id)" (play)="openGame($event)"
                (toggleNotifications)="toggleMatchSubscription($event)">
              </app-pickem-vs-card>
            </div>
          </section>

          <section class="pickem-section" *ngIf="upcomingPickems().length">
            <h2 class="section-title">Upcoming</h2>
           <div class="sidebar-card-ad">
              [register to play/prize banner size tbd]
            </div>
            <div class="cards-grid">
              <app-pickem-vs-card class="pickem-card" *ngFor="let pickem of upcomingPickems()" [match]="pickem"
                [notificationsEnabled]="isMatchSubscribed(pickem.id)"
                [notificationsLoading]="isSubscriptionPending(pickem.id)" (play)="openGame($event)"
                (toggleNotifications)="toggleMatchSubscription($event)">
              </app-pickem-vs-card>
            </div>
          </section>
        </div>

        <app-leaderboard class="leaderboard-mobile" [data]="leaderboard()" [loading]="loadingLeaderboard()"
          [maxRows]="10" [title]="'Leaderboard'" [viewAllLabel]="'View Leaderboard'"
          (viewLeaderboard)="openLeaderboard()">
        </app-leaderboard>
      </div>

      <ng-template #empty>
        <app-empty-state></app-empty-state>
      </ng-template>
    </div>

    <div class="lobby-sidebar">
      <div class="sidebar-card" *ngIf="!isLoggedIn()">
        <div class="sidebar-title">
          Sign in to play
        </div>

        <button (click)="openWpLogin()" class="sidebar-button">
          Sign In
        </button>
      </div>

      <div class="sidebar-card-ad">
        AD Block
      </div>

      <app-leaderboard class="leaderboard-desktop" [data]="leaderboard()" [loading]="loadingLeaderboard()"
        [maxRows]="10" [title]="'Leaderboard'" [viewAllLabel]="'View Leaderboard'"
        (viewLeaderboard)="openLeaderboard()">
      </app-leaderboard>
    </div>
  </div>
</div>

<app-login-required-dialog *ngIf="showLoginDialog()" (closed)="closeLoginDialog()" (loginClick)="openWpLogin()" />
