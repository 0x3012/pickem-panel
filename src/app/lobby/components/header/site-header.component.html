      <button
        type="button"
        class="menu-toggle"
        [class.menu-toggle--open]="mobileMenuOpen()"
        [attr.aria-expanded]="mobileMenuOpen()"
        aria-label="Toggle navigation menu"
        (click)="toggleMobileMenu()"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

    <nav class="top-nav" [class.top-nav--open]="mobileMenuOpen()">
      <a
        *ngIf="showLobbyLinks"
        routerLink="/lobby"
        class="top-nav-link"
        [class.active]="activeTab === 'lobby'"
        (click)="closeMobileMenu()">
        Lobby
      </a>

      <a
        *ngIf="showLobbyLinks"
        routerLink="/my-picks"
        class="top-nav-link"
        [class.active]="activeTab === 'my-picks'"
        (click)="closeMobileMenu()">
        My Picks
      </a>

      <a routerLink="/leaderboard" class="top-nav-link" (click)="closeMobileMenu()">Leaderboard</a>
