<div
  class="vs-card"
  [class.vs-card--won]="isWinningPick()"
  [class.vs-card--lost]="isLosingPick()"
  (click)="startGame()"
>

  <div class="vs-card-header">
        <button
      type="button"
      class="vs-card-bell"
      [class.vs-card-bell--active]="notificationsEnabled"
      [class.vs-card-bell--loading]="notificationsLoading"
      [attr.aria-pressed]="notificationsEnabled"
      [attr.aria-label]="notificationsEnabled ? 'Unsubscribe from match notifications' : 'Subscribe to match notifications'"
      (click)="onToggleNotifications($event)"
    >
      @if (notificationsEnabled) {
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M14.0001 12.6667V13.3334H2.00009V12.6667L3.33343 11.3334V7.33337C3.33343 5.26671 4.68676 3.44671 6.66676 2.86004V2.66671C6.66676 2.31309 6.80724 1.97395 7.05729 1.7239C7.30733 1.47385 7.64647 1.33337 8.00009 1.33337C8.35372 1.33337 8.69285 1.47385 8.9429 1.7239C9.19295 1.97395 9.33343 2.31309 9.33343 2.66671V2.86004C11.3134 3.44671 12.6668 5.26671 12.6668 7.33337V11.3334L14.0001 12.6667ZM9.33343 14C9.33343 14.3537 9.19295 14.6928 8.9429 14.9428C8.69285 15.1929 8.35372 15.3334 8.00009 15.3334C7.64647 15.3334 7.30733 15.1929 7.05729 14.9428C6.80724 14.6928 6.66676 14.3537 6.66676 14M13.1668 2.12671L12.2201 3.07337C12.784 3.63028 13.2317 4.2936 13.5373 5.02488C13.8428 5.75616 14.0001 6.54083 14.0001 7.33337H15.3334C15.3334 5.38004 14.5601 3.50004 13.1668 2.12671ZM0.666761 7.33337H2.00009C2.00009 5.73337 2.64009 4.20004 3.78009 3.07337L2.83343 2.12671C2.14535 2.80775 1.59947 3.61875 1.22752 4.51258C0.855571 5.40641 0.664958 6.36525 0.666761 7.33337Z" fill="#C1272D"/>
        </svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="14" viewBox="0 0 15 14" fill="none">
          <path d="M6.00001 12.6667H8.66668C8.66668 13.0203 8.5262 13.3594 8.27616 13.6095C8.02611 13.8595 7.68697 14 7.33335 14C6.97972 14 6.64059 13.8595 6.39054 13.6095C6.14049 13.3594 6.00001 13.0203 6.00001 12.6667ZM13.3333 11.3333V12H1.33335V11.3333L2.66668 10V6C2.66668 3.93333 4.02001 2.11333 6.00001 1.52667V1.33333C6.00001 0.979711 6.14049 0.640573 6.39054 0.390524C6.64059 0.140476 6.97972 0 7.33335 0C7.68697 0 8.02611 0.140476 8.27616 0.390524C8.5262 0.640573 8.66668 0.979711 8.66668 1.33333V1.52667C10.6467 2.11333 12 3.93333 12 6V10L13.3333 11.3333ZM10.6667 6C10.6667 5.11595 10.3155 4.2681 9.69037 3.64298C9.06525 3.01786 8.2174 2.66667 7.33335 2.66667C6.44929 2.66667 5.60144 3.01786 4.97632 3.64298C4.3512 4.2681 4.00001 5.11595 4.00001 6V10.6667H10.6667V6ZM12.5 0.793333L11.5533 1.74C12.1173 2.2969 12.565 2.96023 12.8705 3.69151C13.1761 4.42278 13.3334 5.20745 13.3333 6H14.6667C14.6667 4.04667 13.8933 2.16667 12.5 0.793333ZM1.26641e-05 6H1.33335C1.33335 4.4 1.97335 2.86667 3.11335 1.74L2.16668 0.793333C1.4786 1.47438 0.932726 2.28538 0.560774 3.17921C0.188823 4.07304 -0.00178976 5.03187 1.26641e-05 6Z" fill="#0A0A0A"/>
        </svg>
      }
    </button>
    <div class="vs-card-date">
      {{
        startsAtDate
      }}
    </div>


  </div>

  <div
    *ngIf="shouldShowLockBlock()"
    class="vs-card-countdown"
    [class.vs-card-countdown--urgent]="isEndingSoon()"
  >
   <svg xmlns="http://www.w3.org/2000/svg" width="11" height="14" viewBox="0 0 11 14" fill="none">
<path d="M9.33333 4.66667C9.68695 4.66667 10.0261 4.80714 10.2761 5.05719C10.5262 5.30724 10.6667 5.64638 10.6667 6V12.6667C10.6667 13.0203 10.5262 13.3594 10.2761 13.6095C10.0261 13.8595 9.68695 14 9.33333 14H1.33333C0.979711 14 0.640573 13.8595 0.390524 13.6095C0.140476 13.3594 0 13.0203 0 12.6667V6C0 5.64638 0.140476 5.30724 0.390524 5.05719C0.640573 4.80714 0.979711 4.66667 1.33333 4.66667H7.33333V3.33333C7.33333 2.8029 7.12262 2.29419 6.74755 1.91912C6.37247 1.54405 5.86377 1.33333 5.33333 1.33333C4.8029 1.33333 4.29419 1.54405 3.91912 1.91912C3.54405 2.29419 3.33333 2.8029 3.33333 3.33333H2C2 2.44928 2.35119 1.60143 2.97631 0.976311C3.60143 0.351189 4.44928 0 5.33333 0C5.77107 0 6.20453 0.0862192 6.60894 0.253735C7.01336 0.421251 7.38083 0.666782 7.69036 0.976311C7.99988 1.28584 8.24542 1.6533 8.41293 2.05772C8.58045 2.46214 8.66667 2.89559 8.66667 3.33333V4.66667H9.33333ZM5.33333 10.6667C5.68695 10.6667 6.02609 10.5262 6.27614 10.2761C6.52619 10.0261 6.66667 9.68696 6.66667 9.33333C6.66667 8.97971 6.52619 8.64057 6.27614 8.39052C6.02609 8.14048 5.68695 8 5.33333 8C4.97971 8 4.64057 8.14048 4.39052 8.39052C4.14048 8.64057 4 8.97971 4 9.33333C4 9.68696 4.14048 10.0261 4.39052 10.2761C4.64057 10.5262 4.97971 10.6667 5.33333 10.6667Z" fill="#545454"/>
</svg>&nbsp; Locks in: {{ countdownText }}
  </div>

  <div class="vs-card-question">
    {{ questionLabel() }}
  </div>

  <div class="vs-card-teams">
    <div
      class="vs-card-team"
      [class.vs-card-team--picked]="isPickedTeam(match.teamA.id)"
      [class.vs-card-team--picked-won]="isPickedTeam(match.teamA.id) && isWinningPick()"
      [class.vs-card-team--picked-lost]="isPickedTeam(match.teamA.id) && isLosingPick()"
    >
      <div class="vs-card-team-logo-wrapper">
        <img
          [src]="match.teamA.logo"
          [alt]="match.teamA.name"
          loading="lazy"
          decoding="async"
          (error)="onLogoError($event, match.teamA.logo)"
        />
      </div>
      <div class="vs-card-team-name">
        {{ match.teamA.name }}
      </div>
      <div class="vs-card-team-picked">
        {{ match.teamA.pickedPercent ?? 0 }}% picked
      </div>
    </div>

    <div
      class="vs-card-team"
      [class.vs-card-team--picked]="isPickedTeam(match.teamB.id)"
      [class.vs-card-team--picked-won]="isPickedTeam(match.teamB.id) && isWinningPick()"
      [class.vs-card-team--picked-lost]="isPickedTeam(match.teamB.id) && isLosingPick()"
    >
      <div class="vs-card-team-logo-wrapper">
        <img
          [src]="match.teamB.logo"
          [alt]="match.teamB.name"
          loading="lazy"
          decoding="async"
          (error)="onLogoError($event, match.teamB.logo)"
        />
      </div>
      <div class="vs-card-team-name">
        {{ match.teamB.name }}
      </div>
      <div class="vs-card-team-picked">
        {{ match.teamB.pickedPercent ?? 0 }}% picked
      </div>
    </div>

  </div>
</div>
